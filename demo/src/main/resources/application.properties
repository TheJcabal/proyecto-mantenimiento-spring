spring.application.name=proyecto-mantenimiento
server.port=8080

# MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/proyecto_mantenimiento?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=mariadb123
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Inicialización SQL (scripts en src/main/resources/database)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:database/schema.sql
spring.sql.init.data-locations=classpath:database/roles.sql,classpath:database/usuarios.sql,classpath:database/usuarios_roles.sql
spring.sql.init.continue-on-error=false
